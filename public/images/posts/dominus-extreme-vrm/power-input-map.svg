<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect x="0" y="0" width="900" height="520" fill="#0f0f0f"/>

  <!-- Title -->
  <text x="450" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#e5e5e5">INPUT SIDE: <tspan fill="#4ade80">8 POWER CONNECTORS</tspan></text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#999">How the ROG Dominus Extreme feeds its VRM array</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- LEFT: input connectors -->
  <text x="155" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#ccc">Up to 8 power inputs</text>

  <rect x="60" y="124" width="190" height="56" rx="8" fill="#161616" stroke="#e8a96a" stroke-width="2"/>
  <text x="155" y="148" text-anchor="middle" font-size="15" font-weight="700" fill="#f0f0f0">2× 24-pin ATX</text>
  <text x="155" y="167" text-anchor="middle" font-size="11" fill="#999">main board power</text>

  <rect x="60" y="194" width="190" height="56" rx="8" fill="#161616" stroke="#e8a96a" stroke-width="2"/>
  <text x="155" y="218" text-anchor="middle" font-size="15" font-weight="700" fill="#f0f0f0">4× 8-pin EPS</text>
  <text x="155" y="237" text-anchor="middle" font-size="11" fill="#999">CPU rail feed</text>

  <rect x="60" y="264" width="190" height="56" rx="8" fill="#161616" stroke="#e8a96a" stroke-width="2"/>
  <text x="155" y="288" text-anchor="middle" font-size="15" font-weight="700" fill="#f0f0f0">2× 6-pin</text>
  <text x="155" y="307" text-anchor="middle" font-size="11" fill="#999">supplemental / PCIe aux</text>

  <!-- Arrows: inputs -> VRM -->
  <g stroke="#4ade80" stroke-width="2.5" fill="none" opacity="0.9">
    <path d="M 250 152 C 310 152, 320 210, 378 218" marker-end="url(#ah)"/>
    <path d="M 250 222 L 378 222" marker-end="url(#ah)"/>
    <path d="M 250 292 C 310 292, 320 234, 378 226" marker-end="url(#ah)"/>
  </g>

  <!-- MIDDLE: VRM block -->
  <rect x="380" y="170" width="210" height="104" rx="10" fill="#13241a" stroke="#4ade80" stroke-width="2.4"/>
  <text x="485" y="206" text-anchor="middle" font-size="15" font-weight="700" fill="#f0f0f0">32× IR3555</text>
  <text x="485" y="227" text-anchor="middle" font-size="13" fill="#ccc">teamed VRM</text>
  <text x="485" y="252" text-anchor="middle" font-size="14" font-weight="700" fill="#4ade80">570A+ sustained</text>

  <!-- Arrow: VRM -> CPU -->
  <path d="M 590 222 L 668 222" stroke="#4ade80" stroke-width="2.5" fill="none" marker-end="url(#ah)" opacity="0.9"/>

  <!-- RIGHT: CPU block -->
  <rect x="670" y="178" width="170" height="88" rx="10" fill="#1c1414" stroke="#f87171" stroke-width="2.2"/>
  <text x="755" y="216" text-anchor="middle" font-size="15" font-weight="700" fill="#f0f0f0">Xeon W-3175X</text>
  <text x="755" y="238" text-anchor="middle" font-size="12" fill="#e8a96a">socket</text>

  <!-- Contrast aside -->
  <rect x="60" y="392" width="780" height="62" rx="10" fill="#141414" stroke="#3f3f3f" stroke-width="1.5"/>
  <text x="84" y="420" font-size="13" font-weight="700" fill="#999">For contrast &#8212;</text>
  <text x="84" y="440" font-size="13" fill="#999">A normal flagship board: <tspan fill="#ccc" font-weight="700">2× 8-pin EPS.</tspan> The Dominus takes up to four times the CPU power feed.</text>

  <!-- Watermark -->
  <text x="892" y="513" text-anchor="end" fill="#ffffff" opacity="0.55" font-size="12">markspcparts.com</text>
</svg>
