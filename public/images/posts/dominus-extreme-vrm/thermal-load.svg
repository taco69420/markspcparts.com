<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect x="0" y="0" width="900" height="520" fill="#0f0f0f"/>

  <!-- Title -->
  <text x="450" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#e5e5e5">HEAT PER STAGE: <tspan fill="#f87171">I²R</tspan></text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#999">Power-stage dissipation scales with the <tspan fill="#ccc">square</tspan> of current</text>

  <!-- Baseline -->
  <line x1="120" y1="400" x2="780" y2="400" stroke="#555" stroke-width="1.5"/>
  <text x="120" y="420" font-size="11" fill="#999">0A</text>

  <!-- Left bar: 60A rated, full height red -->
  <rect x="230" y="110" width="150" height="290" rx="8" fill="#2a1515" stroke="#f87171" stroke-width="2.2"/>
  <rect x="230" y="110" width="150" height="290" rx="8" fill="#f87171" opacity="0.85"/>
  <text x="305" y="250" text-anchor="middle" font-size="22" font-weight="700" fill="#0f0f0f">100%</text>
  <text x="305" y="274" text-anchor="middle" font-size="13" font-weight="600" fill="#0f0f0f">heat (reference)</text>
  <text x="305" y="426" text-anchor="middle" font-size="14" font-weight="700" fill="#f0f0f0">60A rated load</text>
  <text x="305" y="446" text-anchor="middle" font-size="12" fill="#f87171">full thermal limit</text>

  <!-- Right bar: 12.5A actual, ~4% height green -->
  <rect x="540" y="388" width="150" height="12" rx="5" fill="#143020" stroke="#4ade80" stroke-width="2.2"/>
  <rect x="540" y="388" width="150" height="12" rx="5" fill="#4ade80" opacity="0.9"/>
  <text x="615" y="378" text-anchor="middle" font-size="18" font-weight="700" fill="#4ade80">&#8776; 4% heat</text>
  <text x="615" y="426" text-anchor="middle" font-size="14" font-weight="700" fill="#f0f0f0">12.5A actual load</text>
  <text x="615" y="446" text-anchor="middle" font-size="12" fill="#4ade80">runs cold</text>

  <!-- Math callout -->
  <rect x="345" y="150" width="210" height="62" rx="10" fill="#161616" stroke="#e8a96a" stroke-width="1.8"/>
  <text x="450" y="178" text-anchor="middle" font-size="17" font-weight="700" fill="#e8a96a">(12.5 / 60)² ≈ 0.043</text>
  <text x="450" y="199" text-anchor="middle" font-size="11" fill="#999">heat ∝ I²R  →  ~4.3% of rated</text>

  <!-- Connector lines from callout to bars -->
  <line x1="345" y1="181" x2="380" y2="200" stroke="#e8a96a" stroke-width="1.2" opacity="0.5"/>
  <line x1="555" y1="181" x2="540" y2="388" stroke="#e8a96a" stroke-width="1.2" opacity="0.5"/>

  <!-- Bottom takeaway -->
  <text x="450" y="480" text-anchor="middle" font-size="15" font-weight="700" fill="#4ade80">No heat → no thermal cycling → no fatigue.</text>
  <text x="450" y="501" text-anchor="middle" font-size="13" fill="#999">The VRM never works hard enough to wear out.</text>

  <!-- Watermark -->
  <text x="892" y="513" text-anchor="end" fill="#ffffff" opacity="0.55" font-size="12">markspcparts.com</text>
</svg>
