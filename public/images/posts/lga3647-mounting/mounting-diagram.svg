<svg width="680" height="500" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Background -->
<rect width="680" height="500" fill="#0a0a0f"/>

<!-- ── LEFT: Normal consumer CPU ── -->
<text font-family="Inter, sans-serif" font-size="14" font-weight="500" x="170" y="26" text-anchor="middle" fill="#f1f5f9">Normal CPU (LGA 1700)</text>
<text font-family="Inter, sans-serif" font-size="12" x="170" y="42" text-anchor="middle" fill="#f1f5f9" opacity="0.6">small die, wide ILM</text>

<!-- ILM frame -->
<rect x="55" y="65" width="230" height="220" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="Inter, sans-serif" font-size="12" x="170" y="82" text-anchor="middle" fill="#0F6E56">ILM frame</text>

<!-- CPU die — small, centered -->
<rect x="115" y="108" width="110" height="132" rx="4" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
<text font-family="Inter, sans-serif" font-size="14" font-weight="500" x="170" y="168" text-anchor="middle" fill="#2C2C2A">CPU die</text>
<text font-family="Inter, sans-serif" font-size="12" x="170" y="184" text-anchor="middle" fill="#5F5E5A">small</text>

<!-- Clamp arrows -->
<line x1="55" y1="174" x2="113" y2="174" stroke="#1D9E75" stroke-width="3.5" marker-end="url(#arrow)"/>
<line x1="285" y1="174" x2="227" y2="174" stroke="#1D9E75" stroke-width="3.5" marker-end="url(#arrow)"/>

<!-- Spread dashes -->
<line x1="115" y1="174" x2="115" y2="112" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.7"/>
<line x1="115" y1="174" x2="115" y2="236" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.7"/>
<line x1="225" y1="174" x2="225" y2="112" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.7"/>
<line x1="225" y1="174" x2="225" y2="236" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.7"/>

<!-- Full coverage tint -->
<rect x="115" y="108" width="110" height="132" rx="4" fill="#1D9E75" opacity="0.18"/>

<text font-family="Inter, sans-serif" font-size="12" font-weight="500" x="170" y="330" text-anchor="middle" fill="#0F6E56">pressure spreads across whole die</text>
<text font-family="Inter, sans-serif" font-size="12" x="170" y="348" text-anchor="middle" fill="#0F6E56">die is narrow enough that</text>
<text font-family="Inter, sans-serif" font-size="12" x="170" y="364" text-anchor="middle" fill="#0F6E56">side clamps reach top + bottom</text>

<!-- Divider -->
<line x1="340" y1="40" x2="340" y2="455" stroke="#888780" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>

<!-- ── RIGHT: Xeon LGA 3647 ── -->
<text font-family="Inter, sans-serif" font-size="12" x="500" y="18" text-anchor="middle" fill="#A32D2D">little / no pressure</text>

<text font-family="Inter, sans-serif" font-size="14" font-weight="500" x="500" y="36" text-anchor="middle" fill="#f1f5f9">Xeon (LGA 3647)</text>
<text font-family="Inter, sans-serif" font-size="12" x="500" y="50" text-anchor="middle" fill="#f1f5f9" opacity="0.6">massive die, same ILM width</text>

<!-- ILM frame -->
<rect x="385" y="65" width="230" height="220" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="Inter, sans-serif" font-size="12" x="560" y="82" text-anchor="middle" fill="#BA7517">ILM frame</text>

<!-- CPU die — tall, nearly fills frame -->
<rect x="410" y="73" width="180" height="204" rx="4" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
<text font-family="Inter, sans-serif" font-size="14" font-weight="500" x="500" y="168" text-anchor="middle" fill="#2C2C2A">Xeon die</text>
<text font-family="Inter, sans-serif" font-size="12" x="500" y="184" text-anchor="middle" fill="#5F5E5A">massive</text>

<!-- No pressure zone top -->
<rect x="410" y="73" width="180" height="58" fill="#E24B4A" opacity="0.12"/>
<line x1="500" y1="20" x2="500" y2="73" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>

<!-- Good contact band -->
<rect x="410" y="131" width="180" height="82" fill="#BA7517" opacity="0.2"/>

<!-- No pressure zone bottom -->
<rect x="410" y="213" width="180" height="64" fill="#E24B4A" opacity="0.12"/>

<!-- Clamp arrows -->
<line x1="385" y1="174" x2="408" y2="174" stroke="#BA7517" stroke-width="3.5" marker-end="url(#arrow-orange)"/>
<line x1="615" y1="174" x2="592" y2="174" stroke="#BA7517" stroke-width="3.5" marker-end="url(#arrow-orange)"/>

<!-- Short spread dashes -->
<line x1="410" y1="174" x2="410" y2="135" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.5"/>
<line x1="410" y1="174" x2="410" y2="213" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.5"/>
<line x1="590" y1="174" x2="590" y2="135" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.5"/>
<line x1="590" y1="174" x2="590" y2="213" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.5"/>

<!-- Good contact label -->
<line x1="590" y1="174" x2="628" y2="174" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>
<text font-family="Inter, sans-serif" font-size="12" x="632" y="170" text-anchor="start" fill="#633806">good</text>
<text font-family="Inter, sans-serif" font-size="12" x="632" y="185" text-anchor="start" fill="#633806">contact</text>

<!-- Bottom dead zone label -->
<line x1="500" y1="277" x2="500" y2="300" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>
<text font-family="Inter, sans-serif" font-size="12" x="500" y="314" text-anchor="middle" fill="#A32D2D">little / no pressure</text>

<text font-family="Inter, sans-serif" font-size="12" font-weight="500" x="500" y="336" text-anchor="middle" fill="#854F0B">pressure only in the middle band</text>
<text font-family="Inter, sans-serif" font-size="12" x="500" y="354" text-anchor="middle" fill="#993C1D">die is so tall the clamps can't</text>
<text font-family="Inter, sans-serif" font-size="12" x="500" y="370" text-anchor="middle" fill="#993C1D">reach the top and bottom edges</text>

<!-- Bottom summary -->
<line x1="40" y1="392" x2="640" y2="392" stroke="#888780" stroke-width="0.5" opacity="0.4"/>
<text font-family="Inter, sans-serif" font-size="12" x="340" y="416" text-anchor="middle" fill="#f1f5f9" opacity="0.7">Same ILM clamping force — totally different result depending on die size.</text>
<text font-family="Inter, sans-serif" font-size="12" x="340" y="434" text-anchor="middle" fill="#f1f5f9" opacity="0.7">Consumer dies are small enough that side pressure distributes across the whole surface.</text>
<text font-family="Inter, sans-serif" font-size="12" x="340" y="452" text-anchor="middle" fill="#f1f5f9" opacity="0.7">The Xeon die is so large the top and bottom of the IHS barely get any contact at all.</text>
<text font-family="Inter, sans-serif" font-size="12" x="672" y="493" text-anchor="end" fill="#ffffff" opacity="1">markspcparts.com</text>
</svg>
